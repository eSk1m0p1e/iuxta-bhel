<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iuxta × bhel</title>
<meta name="description" content="beside everything. influx of everything.">
<meta property="og:title" content="iuxta × bhel">
<meta property="og:description" content="speak it. anything. the system listens.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    font-family: 'Space Mono', 'Courier New', monospace;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
  }

  /* Noise canvas */
  #noise {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.028;
    pointer-events: none;
    z-index: 1;
  }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 127, 0.012) 2px,
      rgba(0, 255, 127, 0.012) 4px
    );
  }

  /* Glitch bar */
  .glitch-bar {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: rgba(0, 255, 127, 0.5);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    top: 30%;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: rgba(0, 255, 127, 0.25);
    border-style: solid;
    z-index: 4;
  }
  .corner.tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

  /* Main text container */
  #text-stage {
    position: relative;
    z-index: 5;
    text-align: center;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    max-width: 680px;
    width: 100%;
  }

  .line {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.55s ease, transform 0.55s ease;
    font-size: clamp(12px, 2vw, 15px);
    letter-spacing: 0.14em;
    line-height: 2.4;
    white-space: nowrap;
  }

  .line.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .line.faded {
    opacity: 0.12;
    transform: translateY(0);
  }

  .line.accent {
    color: #00ff7f;
  }

  .line.big {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  .line.sub {
    font-size: clamp(9px, 1.4vw, 11px);
    color: rgba(255, 255, 255, 0.28);
    letter-spacing: 0.32em;
  }

  /* Status bar */
  #status {
    position: absolute;
    bottom: 44px;
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(8px, 1.2vw, 10px);
    letter-spacing: 0.35em;
    color: rgba(0, 255, 127, 0.3);
    z-index: 5;
    text-transform: uppercase;
  }

  /* Progress line */
  #progress {
    position: absolute;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    height: 1px;
    width: 0;
    background: rgba(0, 255, 127, 0.35);
    z-index: 5;
    transition: width 1s ease;
    max-width: 320px;
  }

  /* Replay */
  #replay {
    position: absolute;
    bottom: 14px;
    right: 28px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.15);
    background: none;
    border: none;
    cursor: pointer;
    z-index: 10;
    text-transform: uppercase;
    transition: color 0.3s;
    padding: 6px;
  }

  #replay:hover { color: rgba(0, 255, 127, 0.6); }

  /* Ambient glow */
  #glow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0, 255, 127, 0.04) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 3s ease;
  }
  #glow.on { opacity: 1; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="noise"></canvas>
  <div class="scanlines"></div>
  <div class="glitch-bar" id="gbar"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="glow"></div>
  <div id="text-stage"></div>
  <div id="status">SYSTEM IDLE</div>
  <div id="progress"></div>
  <button id="replay">↺ replay</button>
</div>

<script>
(function () {
  const LINES = [
    { text: "you have an idea.",              delay: 500,   cls: "" },
    { text: "it has never existed before.",   delay: 1100,  cls: "" },
    { text: "speak it.",                      delay: 1900,  cls: "accent" },
    { text: "anything.",                      delay: 2800,  cls: "accent big" },
    { text: "a trap that thinks.",            delay: 3700,  cls: "sub" },
    { text: "a shower for twenty-seven.",     delay: 4200,  cls: "sub" },
    { text: "a law you didn't know you had.", delay: 4700,  cls: "sub" },
    { text: "a world that feeds itself.",     delay: 5200,  cls: "sub" },
    { text: "the system listens.",            delay: 6100,  cls: "" },
    { text: "builds a blueprint.",            delay: 6700,  cls: "" },
    { text: "asks —",                         delay: 7300,  cls: "" },
    { text: "is this what you meant?",        delay: 7800,  cls: "accent" },
    { text: "then checks.",                   delay: 8900,  cls: "" },
    { text: "and checks.",                    delay: 9400,  cls: "" },
    { text: "and checks —",                   delay: 9900,  cls: "" },
    { text: "until nothing is left to doubt.",delay: 10500, cls: "accent" },
    { text: "parts ordered.",                 delay: 11700, cls: "sub" },
    { text: "legality flagged.",              delay: 12100, cls: "sub" },
    { text: "instructions in your hands.",   delay: 12500, cls: "sub" },
    { text: "for humankind.",                 delay: 13400, cls: "" },
    { text: "for curiosity.",                 delay: 13950, cls: "" },
    { text: "for the ones who build.",        delay: 14500, cls: "" },
    { text: "iuxta × bhel",                  delay: 15600, cls: "accent big" },
    { text: "beside everything. influx of everything.", delay: 16500, cls: "sub" },
  ];

  const STATUSES = [
    [500,   "receiving signal..."],
    [1800,  "parsing input..."],
    [3600,  "domain scan: unlimited"],
    [5900,  "blueprint engine: online"],
    [7500,  "convergence loop: armed"],
    [10300, "verification: complete"],
    [13200, "output stack: ready"],
    [15500, "system: iuxta × bhel"],
  ];

  const GLITCHES = [1300, 4400, 8000, 10700, 14200];
  const TOTAL = 17200;

  let tids = [];

  function clearAll() {
    tids.forEach(clearTimeout);
    tids = [];
    document.getElementById('text-stage').innerHTML = '';
    document.getElementById('status').textContent = 'system idle';
    document.getElementById('progress').style.width = '0';
    document.getElementById('glow').classList.remove('on');
  }

  function run() {
    clearAll();
    const stage = document.getElementById('text-stage');
    const prog = document.getElementById('progress');
    const statusEl = document.getElementById('status');

    // Turn on ambient glow after title appears
    tids.push(setTimeout(() => document.getElementById('glow').classList.add('on'), 15600));

    LINES.forEach((l) => {
      tids.push(setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'line ' + l.cls;
        div.textContent = l.text;
        stage.appendChild(div);

        requestAnimationFrame(() =>
          requestAnimationFrame(() => div.classList.add('visible'))
        );

        // Fade out older lines beyond the visible window
        const children = Array.from(stage.children);
        const keep = 5;
        if (children.length > keep) {
          children.slice(0, children.length - keep).forEach(el => {
            el.classList.remove('visible');
            el.classList.add('faded');
          });
        }

        // Progress bar
        prog.style.width = Math.min((l.delay / TOTAL) * 100, 94) + '%';
      }, l.delay));
    });

    STATUSES.forEach(([d, s]) => {
      tids.push(setTimeout(() => { statusEl.textContent = s; }, d));
    });

    // Glitch flashes
    GLITCHES.forEach(d => {
      tids.push(setTimeout(() => {
        const bar = document.getElementById('gbar');
        const pct = 15 + Math.random() * 65;
        bar.style.top = pct + '%';
        bar.style.opacity = '1';
        bar.style.width = (40 + Math.random() * 60) + '%';
        bar.style.left = (Math.random() * 20) + '%';
        document.body.style.filter = 'brightness(1.35) hue-rotate(12deg)';
        setTimeout(() => {
          bar.style.opacity = '0';
          document.body.style.filter = '';
        }, 55);
      }, d));
    });
  }

  // ── Noise canvas ──────────────────────────────────────────
  const canvas = document.getElementById('noise');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function drawNoise() {
    const w = canvas.width, h = canvas.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(drawNoise);
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  drawNoise();

  document.getElementById('replay').addEventListener('click', run);

  run();
})();
</script>
</body>
</html>
